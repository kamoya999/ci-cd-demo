name: deploy

on:
  push:
    branches: [ main ]

# 同時に複数のデプロイが走らないようにする（重要）
concurrency: production_environment

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"          # Deployer 8 は PHP 8.3 以上で動作

      - name: (デモアプリ) アプリ依存は不要
        run: echo "アプリは Composer 非依存。Deployer は次の action が導入する。"

      - name: Deploy
        uses: deployphp/action@v1
        with:
          private-key: ${{ secrets.PRIVATE_KEY }}   # EC2 接続用の秘密鍵（Secrets に登録）
          dep: deploy test -vvv
