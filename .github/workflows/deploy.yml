name: deploy

on:
  push:
    branches: [ main ]

# 同時に複数のデプロイが走らないようにする（重要）
concurrency: production_environment

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"          # Deployer 8 は PHP 8.3 以上で動作

      - name: Install Deployer
        # これが無いと deployphp/action が "Deployer binary not found" になる。
        # vendor/bin/dep を用意すると action が自動で検出して使う。
        run: composer require deployer/deployer:^8 --dev --no-interaction

      - name: Deploy
        uses: deployphp/action@v1
        with:
          private-key: ${{ secrets.PRIVATE_KEY }}   # EC2 接続用の秘密鍵（Secrets に登録）
          dep: deploy test -vvv
