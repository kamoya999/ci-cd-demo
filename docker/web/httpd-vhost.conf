# Apache 2.2 (CentOS 6) 用の設定
# DocumentRoot を /var/www/html にし、.htaccess を許可する。
<VirtualHost *:80>
    DocumentRoot /var/www/html
    DirectoryIndex index.php index.html

    <Directory /var/www/html>
        Options FollowSymLinks
        AllowOverride All
        Order allow,deny
        Allow from all
    </Directory>
</VirtualHost>
